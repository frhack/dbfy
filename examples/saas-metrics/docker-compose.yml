services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: billing
    ports:
      - "5433:5432"   # different port from auth-audit so both can run
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      retries: 10
    volumes:
      - ./data/seed.sql:/docker-entrypoint-initdb.d/00-seed.sql:ro
