language = "C"
include_guard = "DBFY_H"
header = """/* dbfy C bindings - auto-generated by cbindgen, do not edit. */

/* Forward declarations of the Arrow C Data Interface structs.
 * Callers that need to inspect the exported batches should also include
 * the canonical `arrow_c_data_interface.h` from their Arrow distribution. */
typedef struct ArrowSchema ArrowSchema;
typedef struct ArrowArray ArrowArray;"""
cpp_compat = true
documentation = true
documentation_style = "doxy"

[export.rename]
"FFI_ArrowArray" = "ArrowArray"
"FFI_ArrowSchema" = "ArrowSchema"

[parse]
parse_deps = false
