name: pypi

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Trusted Publishing via OIDC — no PyPI token needed in repo secrets.
# Configure once on PyPI: https://pypi.org/manage/account/publishing/
# (publisher: github.com/frhack/dbfy, workflow: pypi.yml, env: pypi).

permissions:
  id-token: write  # required for trusted publishing
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wheels:
    name: wheel ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, target: x86_64,  manylinux: 'auto' }
          - { runner: macos-13,      target: x86_64,  manylinux: '' }
          - { runner: macos-14,      target: aarch64, manylinux: '' }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build wheel (linux, manylinux container)
        if: matrix.manylinux != ''
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --strip --out dist --find-interpreter
          working-directory: crates/dbfy-py
      - name: Build wheel (macos, host python)
        if: matrix.manylinux == ''
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip --out dist
          working-directory: crates/dbfy-py
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.runner }}-${{ matrix.target }}
          path: crates/dbfy-py/dist/*.whl

  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: crates/dbfy-py
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: crates/dbfy-py/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/dbfy
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten dist
        run: |
          mkdir -p flat
          find dist -name '*.whl' -o -name '*.tar.gz' | xargs -I {} cp {} flat/
          ls -la flat/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: flat/
          skip-existing: true
