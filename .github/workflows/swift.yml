name: swift-xcframework

# Builds the dbfy.xcframework on macOS and attaches it to the
# release matching the pushed tag. Updates Package.swift in-place
# with the checksum so consumers can pull via:
#
#   .package(url: "https://github.com/typeeffect/dbfy", from: "0.4.1")
#
# No external secrets needed beyond the default GITHUB_TOKEN.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-xcframework:
    runs-on: macos-14
    permissions:
      contents: write       # needed to upload the asset to the release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build xcframework
        run: bash bindings/swift/build-xcframework.sh
      - name: Compute checksum
        id: ck
        run: |
          ck=$(swift package --package-path bindings/swift compute-checksum bindings/swift/dbfy.xcframework.zip)
          echo "checksum=$ck" >> "$GITHUB_OUTPUT"
      - name: Update Package.swift checksum
        # Rewrite the binaryTarget url + checksum in-place so consumers
        # fetching by tag get a Package.swift that points at the right
        # archive with the right hash. We use BSD-portable `sed -i.bak`
        # so the same workflow runs on macos-14 (default sed) without
        # any GNU extensions.
        run: |
          tag="${GITHUB_REF_NAME}"
          ck="${{ steps.ck.outputs.checksum }}"
          url="https://github.com/${{ github.repository }}/releases/download/${tag}/dbfy.xcframework.zip"
          sed -i.bak \
              -e "s|url: \"[^\"]*\"|url: \"$url\"|" \
              -e "s|checksum: \"[^\"]*\"|checksum: \"$ck\"|" \
              bindings/swift/Package.swift
          rm -f bindings/swift/Package.swift.bak
          grep -A1 binaryTarget bindings/swift/Package.swift | head -5
      - name: Upload xcframework to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: bindings/swift/dbfy.xcframework.zip
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
