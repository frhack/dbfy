name: tests

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  # Fast workspace test — runs on every push/PR.
  # Excludes dbfy-frontend-duckdb because the bundled DuckDB compile is
  # ~30 min cold; the dedicated job below covers it on a slower cadence.
  workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --exclude dbfy-frontend-duckdb
      - run: cargo test  --workspace --exclude dbfy-frontend-duckdb

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Bundled-DuckDB integration tier. Slower (~30 min cold) so we only run
  # it on push to main; PRs against main can use `workflow_dispatch` if
  # they touch the DuckDB frontend.
  duckdb-integration:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: duckdb-bundled
      - run: cargo test -p dbfy-frontend-duckdb --features duckdb --jobs 1
